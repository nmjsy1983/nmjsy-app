name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-mb/package-lock.json

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          packages: "platform-tools platforms;android-35 build-tools;35.0.0"
          accept-android-sdk-licenses: true

      - name: Install frontend dependencies
        working-directory: frontend-mb
        run: npm ci

      - name: Build frontend
        working-directory: frontend-mb
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || '/api' }}
        run: npm run build

      - name: Sync Capacitor Android project
        working-directory: frontend-mb
        run: npx cap sync android

      - name: Build debug APK
        working-directory: frontend-mb/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: frontend-mb/android/app/build/outputs/apk/debug/app-debug.apk
